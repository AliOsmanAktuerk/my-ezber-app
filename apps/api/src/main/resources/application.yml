spring:
  config:
    import: optional:file:.env.local[.properties]
  application:
    name: ezber-api
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/ezber_app?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:ezber}
    password: ${DB_PASSWORD:ezber_password}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:true}
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

server:
  port: ${SERVER_PORT:8080}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs

app:
  admin:
    email: ${ADMIN_EMAIL:admin@ezber.local}
    password: ${ADMIN_PASSWORD:Admin123456!}
    name: ${ADMIN_NAME:Admin}
  security:
    jwt-secret: ${JWT_SECRET:change-this-development-secret-change-this-development-secret}
    jwt-expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
  frontend:
    base-url: ${FRONTEND_BASE_URL:http://localhost:3000}
  mail:
    from: ${MAIL_FROM:no-reply@my-ezber-app.local}
    sender-name: ${MAIL_SENDER_NAME:My Ezber App}
    imprint:
      name: ${MAIL_IMPRINT_NAME:My Ezber App}
      address: ${MAIL_IMPRINT_ADDRESS:Bitte Impressumsadresse in apps/api/.env.local eintragen}
      email: ${MAIL_IMPRINT_EMAIL:${MAIL_FROM:no-reply@my-ezber-app.local}}
      url: ${MAIL_IMPRINT_URL:http://localhost:3000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
